<div class="flex h-screen bg-gray-50">
  <!-- Mobile Sidebar Overlay -->
  @if (sidebarOpen()) {
    <div
      class="fixed inset-0 z-40 bg-black/50 lg:hidden"
      (click)="closeSidebar()"
    ></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed left-0 top-0 h-screen w-64 transform bg-slate-900 text-white shadow-lg transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0"
    [class.translate-x-0]="sidebarOpen()"
    [class.translate-x-full]="!sidebarOpen()"
  >
    <!-- Sidebar Header -->
    <div class="flex items-center justify-between border-b border-slate-700 p-6">
      <h1 class="text-2xl font-bold text-white">BiblioKeep</h1>
      <!-- Close button for mobile -->
      <button
        class="lg:hidden"
        (click)="closeSidebar()"
        aria-label="Close sidebar"
      >
        <svg
          class="h-6 w-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 space-y-2 px-4 py-6">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          (click)="closeSidebar()"
          class="flex items-center gap-4 rounded-lg px-4 py-3 text-white font-semibold text-lg transition-all duration-200 hover:bg-slate-700 hover:shadow-md border-l-4 border-transparent cursor-pointer bg-slate-800"
          routerLinkActive="bg-blue-600 border-l-blue-300 shadow-lg"
        >
          <span class="text-xl">{{ item.emoji }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Sidebar Footer -->
    <div class="border-t border-slate-700 p-4">
      <!-- User Info -->
      @if (user()) {
        <div class="mb-4 rounded-lg bg-slate-800 p-3">
          <p class="text-xs text-gray-400">Sesión iniciada como:</p>
          <p class="truncate text-sm font-medium text-white">{{ user()!.email }}</p>
        </div>
      }

      <button
        (click)="logout()"
        class="w-full rounded-lg bg-red-600 px-4 py-2 text-left text-sm font-medium text-white transition-colors hover:bg-red-700"
      >
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex flex-1 flex-col overflow-hidden">
    <!-- Header -->
    <header class="border-b border-gray-200 bg-white shadow-sm">
      <div class="flex items-center justify-between px-6 py-4">
        <!-- Mobile Menu Button -->
        <button
          class="rounded-lg p-2 text-gray-600 hover:bg-gray-100 lg:hidden"
          (click)="toggleSidebar()"
          aria-label="Toggle sidebar"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </button>

        <!-- App Title (visible only on mobile) -->
        <h1 class="text-xl font-bold text-slate-900 lg:hidden">BiblioKeep</h1>

        <!-- Header Actions -->
        <div class="flex items-center gap-4">
          <!-- User Menu Placeholder -->
          <button
            class="flex h-10 w-10 items-center justify-center rounded-full bg-gray-200 text-gray-700 hover:bg-gray-300"
            title="User menu"
          >
            <svg
              class="h-6 w-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <main class="flex-1 overflow-y-auto bg-gray-50 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
